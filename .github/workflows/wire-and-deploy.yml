name: Wire + Deploy

# Fires on every Spark publish to main + manual trigger.
# Order: checkout → git config → wiring → commit → push to deploy/production → Notion log.
# Railway watches deploy/production. Spark owns main. Never touch each other's branch.
#
# Required GitHub secrets:  NOTION_API_KEY
# Required GitHub variables: NOTION_DATABASE_ID

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NOTION_VERSION: "2022-06-28"
  LIVE_ACTIVITY_PAGE_ID: "337f99e853ab81929ebbed2fc770352b"

concurrency:
  group: ${{ github.workflow }}-deploy
  cancel-in-progress: true

jobs:
  wire-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Configure git identity (used by commit + push steps)
        run: |
          git config user.name  "Loft OS Architect"
          git config user.email "architect@vergara-inc.com"

      - name: Install dependencies
        run: npm ci

      - name: Apply wiring
        run: node scripts/apply-wiring.mjs
        env:
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Commit wiring if changed
        run: |
          if ! git diff --quiet; then
            git add -A
            git commit -m "ci: apply integration wiring [skip ci]"
            echo "WIRING_APPLIED=true" >> $GITHUB_ENV
          else
            echo "WIRING_APPLIED=false" >> $GITHUB_ENV
          fi

      - name: Push to deploy/production
        id: push
        run: |
          git push origin HEAD:deploy/production --force
          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: Notion — deploy callout
        if: always()
        continue-on-error: true
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          # Pass user-controlled strings via env so bash never parses them as code.
          RAW_MSG: ${{ github.event.head_commit.message || github.sha }}
          AUTHOR: ${{ github.actor }}
          COMPARE: ${{ github.event.compare || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -z "$NOTION_API_KEY" ]; then
            echo "NOTION_API_KEY not set — skipping"; exit 0
          fi
          PAGE_ID="${{ env.LIVE_ACTIVITY_PAGE_ID }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MSG=$(printf '%s' "$RAW_MSG" | head -1 | cut -c1-100)

          # Dedup: extract plain_text from the last 5 blocks and check for the SHA.
          # Skips the PATCH if a previous run already logged this SHA.
          EXISTING_HTTP=$(curl -s -o /tmp/notion-existing.json -w '%{http_code}' \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: ${{ env.NOTION_VERSION }}" \
            "https://api.notion.com/v1/blocks/$PAGE_ID/children?page_size=5")
          if [ "$EXISTING_HTTP" -ge 200 ] && [ "$EXISTING_HTTP" -lt 300 ]; then
            if jq -e --arg sha "$SHORT_SHA" \
                '[.results[]?.callout?.rich_text[]?.plain_text?] | map(select(. != null) | contains($sha)) | any' \
                /tmp/notion-existing.json > /dev/null; then
              echo "Already logged $SHORT_SHA — skipping"
              exit 0
            fi
          else
            echo "::warning::Notion dedup GET returned $EXISTING_HTTP — proceeding without dedup"
            cat /tmp/notion-existing.json
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            EMOJI="🚀"; COLOR="green_background"; LABEL="DEPLOYED"
          else
            EMOJI="🔴"; COLOR="red_background"; LABEL="FAILED"
          fi

          # jq -n with --arg properly escapes ", \, newlines, etc. in user-controlled fields.
          PAYLOAD=$(jq -n \
            --arg label   "$LABEL" \
            --arg ts      "$TIMESTAMP" \
            --arg sha     "$SHORT_SHA" \
            --arg msg     "$MSG" \
            --arg author  "$AUTHOR" \
            --arg compare "$COMPARE" \
            --arg emoji   "$EMOJI" \
            --arg color   "$COLOR" \
            '{children: [{
               object: "block",
               type: "callout",
               callout: {
                 icon: { type: "emoji", emoji: $emoji },
                 color: $color,
                 rich_text: [{
                   type: "text",
                   text: { content: ($label + " · resale-scanner-pro · " + $ts + "\nCommit: " + $sha + " — " + $msg + "\nAuthor: " + $author + "\nDiff: " + $compare) }
                 }]
               }
             }]}')

          HTTP=$(curl -s -o /tmp/notion-resp.json -w '%{http_code}' -X PATCH \
            "https://api.notion.com/v1/blocks/$PAGE_ID/children" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: ${{ env.NOTION_VERSION }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Notion PATCH HTTP $HTTP"
          if [ "$HTTP" -ge 400 ]; then
            cat /tmp/notion-resp.json
            echo "::warning::Notion callout failed (HTTP $HTTP)"
          fi
