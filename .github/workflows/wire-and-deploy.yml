name: Wire + Deploy

# Fires on every Spark publish to main + manual trigger.
# Order: checkout → git config → wiring → commit → push to deploy/production → Notion log.
# Railway watches deploy/production. Spark owns main. Never touch each other's branch.
#
# Required GitHub secrets:  NOTION_API_KEY
# Required GitHub variables: NOTION_DATABASE_ID
# Optional GitHub secrets:  N8N_DEPLOY_WEBHOOK (reserved, not used yet)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NOTION_VERSION: "2022-06-28"
  LIVE_ACTIVITY_PAGE_ID: "337f99e853ab81929ebbed2fc770352b"

concurrency:
  group: ${{ github.workflow }}-deploy
  cancel-in-progress: true

jobs:
  wire-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure git identity (used by commit + push steps)
        run: |
          git config user.name  "Loft OS Architect"
          git config user.email "architect@vergara-inc.com"

      - name: Install dependencies
        run: npm ci

      - name: Apply wiring
        run: node scripts/apply-wiring.mjs
        env:
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Commit wiring if changed
        run: |
          if ! git diff --quiet; then
            git add -A
            git commit -m "ci: apply integration wiring [skip ci]"
            echo "WIRING_APPLIED=true" >> $GITHUB_ENV
          else
            echo "WIRING_APPLIED=false" >> $GITHUB_ENV
          fi

      - name: Push to deploy/production
        id: push
        run: |
          git push origin HEAD:deploy/production --force
          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: Notion — log DEPLOYED
        if: success() && steps.push.outputs.deployed == 'true'
        continue-on-error: true
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          [ -z "$NOTION_API_KEY" ] && exit 0
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%b %d %Y %H:%M UTC")
          MSG=$(echo '${{ github.event.head_commit.message }}' | cut -c1-100)
          curl -s -X PATCH \
            "https://api.notion.com/v1/blocks/${{ env.LIVE_ACTIVITY_PAGE_ID }}/children" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: ${{ env.NOTION_VERSION }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"children\": [{
                \"object\": \"block\",
                \"type\": \"callout\",
                \"callout\": {
                  \"icon\": { \"type\": \"emoji\", \"emoji\": \"✅\" },
                  \"color\": \"green_background\",
                  \"rich_text\": [{
                    \"type\": \"text\",
                    \"text\": { \"content\": \"DEPLOYED · ${TIMESTAMP} · ${SHORT_SHA} · ${MSG}\" }
                  }]
                }
              }]
            }"

      - name: Notion — log FAILED
        if: failure()
        continue-on-error: true
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          [ -z "$NOTION_API_KEY" ] && exit 0
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%b %d %Y %H:%M UTC")
          MSG=$(echo '${{ github.event.head_commit.message }}' | cut -c1-100)
          curl -s -X PATCH \
            "https://api.notion.com/v1/blocks/${{ env.LIVE_ACTIVITY_PAGE_ID }}/children" \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Notion-Version: ${{ env.NOTION_VERSION }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"children\": [{
                \"object\": \"block\",
                \"type\": \"callout\",
                \"callout\": {
                  \"icon\": { \"type\": \"emoji\", \"emoji\": \"❌\" },
                  \"color\": \"red_background\",
                  \"rich_text\": [{
                    \"type\": \"text\",
                    \"text\": { \"content\": \"FAILED · ${TIMESTAMP} · ${SHORT_SHA} · ${MSG}\" }
                  }]
                }
              }]
            }"
