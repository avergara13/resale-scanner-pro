name: CI

# Runs on every PR to main and on every push to main.
# This is the PRIMARY safety gate — it must pass before any PR can merge.
#
# Enable branch protection in GitHub → Settings → Branches → main:
#   ✅ Require status checks to pass before merging
#   ✅ Add "CI / validate" as a required check
#   ✅ Require branches to be up to date before merging
#
# With this in place, Dependabot PRs and all other PRs are validated
# before any code reaches main, preventing broken types or lint from
# ever landing in the deploy branch.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        # Bump Node heap to 6GB. ESLint's TypeScript-aware rules build a
        # full type graph and have been hitting the default 4GB heap on
        # GitHub-hosted runners (failure on PR #201). 6GB stays well under
        # the 7GB available on ubuntu-latest while leaving headroom.
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run lint
